<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — Diseño</title>
<link rel="icon" type="image/png" href="../favicon.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8FAFC; color: #1a1a1a; min-height: 100vh; }
  .page { max-width: 820px; margin: 0 auto; padding: 2.5rem 1.5rem; }
  .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; color: #2563EB; text-transform: uppercase; margin-bottom: 2rem; }
  .header-title { font-size: 28px; font-weight: 600; color: #0f172a; margin-bottom: 6px; }
  .header-sub { font-size: 15px; color: #64748b; margin-bottom: 2.5rem; line-height: 1.5; }
  .section-label { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .card { background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; padding: 1.25rem; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 6px; transition: border-color 0.15s, box-shadow 0.15s; }
  .card:hover { border-color: #2563EB; box-shadow: 0 2px 12px rgba(37,99,235,0.08); }
  .card-tag { font-size: 10px; font-weight: 600; color: #2563EB; text-transform: uppercase; letter-spacing: 0.08em; background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 20px; padding: 2px 10px; width: fit-content; }
  .card-title { font-size: 15px; font-weight: 600; color: #0f172a; }
  .card-desc { font-size: 13px; color: #64748b; line-height: 1.5; }
  .card-date { font-size: 12px; color: #94a3b8; margin-top: 4px; }
  .empty { font-size: 14px; color: #94a3b8; padding: 2rem 0; }
</style>
</head>
<body>
<div class="page">
  <div class="logo">Nexus · Diseño</div>
  <h1 class="header-title">Prototipos</h1>
  <p class="header-sub">Exploración visual del producto. Solo accesible por URL.</p>

  <div class="section-label">En progreso</div>
  <div class="grid" id="wip">
    <!-- Ejemplo:
    <a class="card" href="./v1-onboarding/">
      <span class="card-tag">Onboarding</span>
      <span class="card-title">Flujo de alta de SGC</span>
      <span class="card-desc">Pantallas de registro y configuración inicial.</span>
      <span class="card-date">jun 2025</span>
    </a>
    -->
    <p class="empty">Ningún prototipo todavía.</p>
  </div>

  <div class="section-label" style="margin-top:2rem;">Archivados</div>
  <div class="grid" id="archived">
    <p class="empty">Ninguno.</p>
  </div>
</div>
</body>
</html>
